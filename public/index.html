<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eat To Grow</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.182.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="start" class="start-panel">
      <h1>Eat To Grow</h1>
      <p class="player-name-line">
        Playing as <strong id="playerNameText">Guest</strong>
        <a href="https://games.greglab.net">(change at Hub)</a>
      </p>
      <input type="hidden" id="nameInput" />
      <p id="lobbyStatus" class="lobby-status" aria-live="polite"></p>
      <button id="playButton" type="button">Play</button>
      <a id="hubLinkStart" href="https://games.greglab.net">Back to Games Hub</a>
    </div>

    <div id="hud" class="hud hidden">
      <div id="escHint" class="esc-hint hidden">Esc · pause / exit</div>
      <div class="size-readout" id="sizeReadout">Size: 1.0u</div>
      <div class="stamina" id="staminaBar" aria-label="Sprint stamina">
        <div class="stamina-fill" id="staminaFill"></div>
      </div>
      <div class="wallet" id="walletReadout"></div>
      <div class="action-feed" id="actionFeed" aria-live="polite"></div>
      <div class="leaderboard">
        <div class="leaderboard-title">Leaderboard</div>
        <ol id="leaderboardList"></ol>
      </div>
      <div class="eat-toast hidden" id="eatToast"></div>
    </div>

    <div id="pauseMenu" class="pause-menu hidden">
      <div class="gl-pause-card">
        <h2>Paused</h2>
        <p class="pause-controls">WASD move · Shift run · Space jump · Mouse look · Press Esc to pause / exit</p>
        <div class="gl-pause-actions">
          <button id="resumeButton" class="gl-btn" type="button">Resume</button>
          <button id="exitLobbyButton" class="gl-btn gl-btn--ghost" type="button">Exit to Lobby</button>
        </div>
      </div>
    </div>

    <div id="eatOverlay" class="eat-overlay hidden">
      <div id="eatOverlayText">You're being eaten!</div>
      <strong id="eatCountdown">3</strong>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/greglab-client.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
